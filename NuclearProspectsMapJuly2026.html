document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';

      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);

    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';

    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).

    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

n-ext */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"bc695b69-3b66-4099-95f3-dfe7dfaa7f97\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"5579a37e-8be4-4206-9c61-aca67bf3e614\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n<\u002Fstyle>\n<style>/* Applied Atomics — Color Tokens\n   Source: Brand Style Guide §4 (Color)\n   Primary:   Charcoal + Silver\n   Secondary: Stone Gray (use sparingly, mainly backgrounds)\n   Accent:    Electric Pink (always sparingly, always with primaries)\n\n   Aesthetic: \"Future Functional\" — monochrome base, single hot accent. */\n\n:root {\n  /* ---- Brand core (exact spec values) ---- */\n  --aa-charcoal:   #272E2E;  /* primary dark  */\n  --aa-silver:     #F4F5F5;  /* primary light */\n  --aa-stone:      #B8BBBC;  /* secondary     */\n  --aa-pink:       #FF209E;  /* accent        */\n\n  /* ---- Neutral ramp (derived from charcoal→silver, cool industrial) ---- */\n  --aa-ink:        #161A1A;  /* deepest, near-black panels */\n  --aa-charcoal-2: #2F3838;  /* raised charcoal surface    */\n  --aa-gray-800:   #3A4242;\n  --aa-gray-700:   #4C5454;\n  --aa-gray-600:   #646C6C;\n  --aa-gray-500:   #828989;  /* muted text on light        */\n  --aa-gray-400:   #9DA2A2;\n  --aa-gray-300:   #C9CCCC;  /* hairlines on light         */\n  --aa-gray-200:   #DFE1E1;  /* dividers                   */\n  --aa-gray-100:   #ECEDED;  /* sunken fill                */\n  --aa-white: acity:.35}\n  .toggle-row{display:flex; align-items:center; gap:10px; padding:8px 10px; border:1px solid var(--charcoal); background:#fff; cursor:pointer; user-select:none; margin-bottom:10px}\n  .toggle-row b{font-size:19px; font-weight:600; line-height:1.1}\n  .toggle-row .sw{margin-left:auto; width:34px; height:18px; border:1.5px solid var(--charcoal); border-radius:10px; position:relative; flex:none; transition:background .18s}\n  .toggle-row .sw::after{content:\"\"; position:absolute; top:1.5px; left:2px; width:11px; height:11px; border-radius:50%; background:var(--charcoal); transition:left .18s}\n  .toggle-row.on .sw{background:var(--pink); border-color:var(--pink)}\n  .toggle-row.on .sw::after{left:18px; background:#fff}\n  .prospect-pin{width:12px; height:12px; background:#272E2E; border:1.5px solid #F4F5F5; transform:rotate(45deg); box-shadow:0 0 0 1px #272E2E; display:block}\n  .prospect-pin:hover{background:#FF209E}\n  .expand-pin{width:0; height:0; border-left:8px solid transparent; border-right:8px solid transparent; border-bottom:14px solid #FF209E; display:block; filter:drop-shadow(0 0 1px #272E2E)}\n  .expand-pin:hover{border-bottom-color:#272E2E}\n  .mil-pin{width:11px; height:11px; background:#272E2E; border:2px solid #FF209E; box-shadow:0 0 0 1.5px #F4F5F5; display:block}\n  .mil-pin:hover{background:#FF209E; border-color:#272E2E}\n  .fleet-dot-a{width:9px; height:9px; border-radius:50%; background:#272E2E; border:1.5px solid #F4F5F5; box-shadow:0 0 0 1px #272E2E; display:block}\n  .fleet-dot-d{width:9px; height:9px; border-radius:50%; background:#F4F5F5; border:1.5px dashed #272E2E; display:block}\n  .fleet-dot-a:hover,.fleet-dot-d:hover{background:#FF209E}\n  .policy-legend .legend-row{cursor:default}\n  .policy-legend .legend-row:hover{border-color:transparent; background:transparent}\n  .policy-src{display:inline-block; margin-top:6px; font-family:\"IBM Plex Mono\",monospace; font-size:10px; letter-spacing:.14em; text-transform:uppercase; text-decoration:none; border-bottom:2px solid var(--pink); padding-bottom:1px}\n  .leaflet-tooltip.state-tip{font-family:\"Darker Grotesque\",sans-serif; border:1px solid var(--charcoal); border-radius:2px; box-shadow:none; padding:6px 10px}\n  .state-tip b{font-size:18px; font-weight:600}\n  .state-tip .tt-meta{font-family:\"IBM Plex Mono\",monospace; font-size:9.5px; letter-spacing:.14em; text-transform:uppercase}\n  .dot{width:13px; height:13px; border-radius:50%; flex:none; border:2px solid transparent}\n  .legend-row b{font-size:19px; font-weight:600; line-height:1.1}\n  .legend-row .count{margin-left:auto; font-family:\"IBM Plex Mono\",monospace; font-size:11px; color:#5c6465}\n  .featured-card{background:#fff; border:1px solid #d7dadb; border-left:3px solid var(--pink); padding:10px 12px 12px; margin-bottom:8px; cursor:pointer}\n  .featured-card:hover{box-shadow:0 2px 8px rgba(39,46,46,.12)}\n  .featured-card h3{font-size:20px; font-weight:600; line-height:1.05}\n  .featured-card .meta{font-family:\"IBM Plex Mono\",monospace; font-size:10.5px; letter-spacing:.06em; color:#5c6465; margin-top:3px}\n  .featured-card p{font-size:16px; line-height:1.25; margin-top:5px; color:#3c4444}\n  #map{flex:1; min-width:0; background:#e6e8e8}\n  .leaflet-tile{filter:grayscale(1) brightness(1.06) contrast(.92)}\n  .leaflet-container{font-family:\"Darker Grotesque\",sans-serif}\n  .leaflet-popup-content-wrapper{border-radius:4px; border:1px solid var(--charcoal); box-shadow:0 4px 16px rgba(39,46,46,.25)}\n  .leaflet-popup-content{margin:14px 16px 14px; width:288px !important}\n  .pp-stage{display:inline-block; font-family:\"IBM Plex Mono\",monospace; font-size:9.5px; letter-spacing:.22em; text-transform:uppercase; color:#fff; padding:3px 8px 2px; margin-bottom:7px}\n  .pp-title{font-size:24px; font-weight:600; line-height:1; letter-spacing:-.01em}\n  .pp-sub{font-family:\"IBM Plex Mono\",monospace; font-size:10.5px; color:#5c6465; margin-top:3px; letter-spacing:.04em}\n  .pp-body{font-size:16.5px; line-height:1.3; margin-top:8px; color:#3c4444}\n  .pp-link{display:inline-block; margin-top:10px; font-family:\"IBM Plex Mono\",monospace; font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:var(--charcoal); text-decoration:none; border-bottom:2px solid var(--pink); padding-bottom:2px}\n  .pp-link:hover{color:var(--pink)}\n  .pulse{animation:pulse 2.2s ease-out infinite; transform-origin:center; transform-box:fill-box}\n  @keyframes pulse{0%{opacity:.55; transform:scale(1)} 70%{opacity:0; transform:scale(2.6)} 100%{opacity:0; transform:scale(2.6)}}\n  .footnote{font-family:\"IBM Plex Mono\",monospace; font-size:10px; line-height:1.6; letter-spacing:.04em; color:#5c6465; padding:12px 20px; border-top:1px solid #d7dadb}\n<\u002Fstyle>\n<\u002Fhead>\n\n<body>\n<header>\n  <img src=\"50d53e03-5cd0-455b-a320-f0fd84ace66a\" alt=\"Applied Atomics\">\n  <div>\n    <div class=\"eyebrow\">US&nbsp;&nbsp;+&nbsp;&nbsp;Canada&nbsp;&nbsp;·&nbsp;&nbsp;Nuclear&nbsp;&nbsp;Siting&nbsp;&nbsp;Intelligence<\u002Fdiv>\n    <h1>Nuclear power-plant permits &amp; licensing stages<\u002Fh1>\n  <\u002Fdiv>\n  <div class=\"hd-right eyebrow\">Data&nbsp;as&nbsp;of&nbsp;July&nbsp;2026<br>NRC&nbsp;·&nbsp;CNSC<\u002Fdiv>\n<\u002Fheader>\n<main>\n  <aside>\n    <div class=\"panel-scroll\">\n      <div class=\"sec-label\">Permit stage — click to filter<\u002Fdiv>\n      <div id=\"legend\"><\u002Fdiv>\n      <div class=\"sec-label\">State nuclear policy — US layer<\u002Fdiv>\n      <div class=\"toggle-row on\" id=\"policyToggle\"><b>Nuclear-friendly vs. restricted states<\u002Fb><span class=\"sw\"><\u002Fspan><\u002Fdiv>\n      <div class=\"policy-legend\" id=\"policyLegend\"><\u002Fdiv>\n      <a class=\"policy-src\" href=\"https://www.energy.gov/ne/articles/what-nuclear-moratorium\" target=\"_blank\" rel=\"noopener\">Source — DOE, June 2026 ↗<\u002Fa>\n      <div class=\"sec-label\">Top prospects — Tier 1 states<\u002Fdiv>\n      <div class=\"toggle-row on\" id=\"prospectToggle\"><b>Utility &amp; industrial prospects <span style=\"color:#5c6465\">(TX · IN · WV · KY · NC · OH)<\u002Fspan><\u002Fb><span class=\"sw\"><\u002Fspan><\u002Fdiv>\n      <div class=\"sec-label\">Expansion prospects — other states<\u002Fdiv>\n      <div class=\"toggle-row on\" id=\"expandToggle\"><b>Recommended new prospects <span style=\"color:#5c6465\">(pink triangles)<\u002Fspan><\u002Fb><span class=\"sw\"><\u002Fspan><\u002Fdiv>\n      <div class=\"sec-label\">Military nuclear deployment<\u002Fdiv>\n      <div class=\"toggle-row on\" id=\"milToggle\"><b>Defense installations — microreactor programs <span style=\"color:#5c6465\">(squares)<\u002Fspan><\u002Fb><span class=\"sw\"><\u002Fspan><\u002Fdiv>\n      <div class=\"sec-label\">Existing nuclear fleet<\u002Fdiv>\n      <div class=\"toggle-row on\" id=\"fleetToggle\"><b>Operating &amp; decommissioned plants <span style=\"color:#5c6465\">(dots: filled = operating, dashed = shut down)<\u002Fspan><\u002Fb><span class=\"sw\"><\u002Fspan><\u002Fdiv>\n      <div class=\"sec-label\">Featured — approved sites, room to build<\u002Fdiv>\n      <div id=\"featured\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footnote\">Each marker is clickable — the popup links to the official source page (NRC / CNSC / Federal Register). Pink sites hold an active Early Site Permit: NRC-approved for new nuclear plants with nothing yet constructed under it. State policy layer covers US states only; hover a state for its status.<\u002Fdiv>\n  <\u002Faside>\n  <div id=\"map\"><\u002Fdiv>\n<\u002Fmain>\n<script>\nconst STAGES = {\n  esp:    {label:\"Active Early Site Permit — approved, unbuilt\", color:\"#FF209E\", featured:true},\n  col:    {label:\"Combined License issued — licensed to build, unbuilt\", color:\"#6E56D8\", featured:true},\n  build:  {label:\"Construction permit issued / building\", color:\"#1FA0AE\"},\n  review: {label:\"Permit application under review\", color:\"#D98E2B\"},\n  early:  {label:\"Pre-licensing / planning\", color:\"#8A9092\"},\n  op:     {label:\"Built & operating under new permit\", color:\"#272E2E\"},\n  term:   {label:\"Permit terminated\", color:\"#B8BBBC\", hollow:true}\n};\nconst SITES = [\n {n:\"Grand Gulf ESP Site\", loc:\"Port Gibson, Mississippi\", lat:32.0074, lng:-91.0475, s:\"esp\", star:true,\n  d:\"Early Site Permit ESP-002 (Entergy / System Energy Resources), active since 2007 — approves the site adjacent to the existing Grand Gulf station for additional plants up to 8,600 MWt, with nothing built under it. A 20-year renewal application was docketed by the NRC in January 2026; the current permit expires April 5, 2027.\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/large-lwr/esp/grandgulf\", src:\"NRC — Grand Gulf ESP renewal\"},\n {n:\"Clinton ESP Site\", loc:\"Clinton, Illinois\", lat:40.1725, lng:-88.8342, s:\"esp\",\n  d:\"Early Site Permit ESP-001 (Constellation, formerly Exelon), issued March 2007 for a new plant next to Clinton Power Station. No construction permit or COL has referenced it — the site is banked for future build-out.\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/large-lwr/esp\", src:\"NRC — Early Site Permits\"},\n {n:\"PSEG Salem / Hope Creek ESP Site\", loc:\"Lower Alloways Creek, New Jersey\", lat:39.4677, lng:-75.5330, s:\"esp\",\n  d:\"Early Site Permit ESP-005 (PSEG Nuclear), issued May 2016 for a new plant adjacent to Salem and Hope Creek. Nothing has been constructed under the permit — a fully approved greenfield slot on an operating nuclear site.\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/large-lwr/esp\", src:\"NRC — Early Site Permits\"},\n {n:\"Clinch River Nuclear Site\", loc:\"Oak Ridge, Tennessee\", lat:35.8873, lng:-84.3810, s:\"esp\",\n  d:\"Early Site Permit ESP-006 (TVA), issued December 2019 for SMRs up to 800 MWe — still unbuilt. TVA's construction permit application for a BWRX-300 at the site is now under active NRC review (draft SEIS issued late 2025).\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/advanced/who-were-working-with/applicant-projects/clinch-river\", src:\"NRC — Clinch River application\"},\n {n:\"North Anna Unit 3\", loc:\"Mineral, Virginia\", lat:38.0607, lng:-77.7903, s:\"col\",\n  d:\"Dominion holds both Early Site Permit ESP-003 (2007, amended 2013) and an active Combined License for North Anna 3 (ESBWR), issued June 2017. Fully licensed to build and operate a new unit — construction never started.\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/large-lwr/col-holder\", src:\"NRC — Combined License holders\"},\n {n:\"Enrico Fermi Unit 3\", loc:\"Newport, Michigan\", lat:41.9631, lng:-83.2572, s:\"col\",\n  d:\"DTE Electric holds an active Combined License (ESBWR), issued May 2015, for a third unit at the Fermi site. Licensed to build and operate — no construction to date.\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/large-lwr/col-holder\", src:\"NRC — Combined License holders\"},\n {n:\"William States Lee III Units 1–2\", loc:\"Gaffney, South Carolina\", lat:35.0370, lng:-81.5780, s:\"col\",\n  d:\"Duke Energy holds active Combined Licenses for two AP1000 units, issued December 2016. The project was suspended in 2017 but the licenses remain active — a fully licensed greenfield nuclear site.\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/large-lwr/col-holder\", src:\"NRC — Combined License holders\"},\n {n:\"Turkey Point Units 6–7\", loc:\"Homestead, Florida\", lat:25.4353, lng:-80.3309, s:\"col\",\n  d:\"Florida Power & Light holds active Combined Licenses for two AP1000 units, issued April 2018, adjacent to the operating Turkey Point plant. Construction has not begun.\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/large-lwr/col-holder\", src:\"NRC — Combined License holders\"},\n {n:\"Kemmerer Unit 1 — Natrium\", loc:\"Kemmerer, Wyoming\", lat:41.7600, lng:-110.5800, s:\"build\",\n  d:\"TerraPower received an NRC construction permit on March 4, 2026 — the first ever for a commercial non-light-water reactor. The 345 MWe sodium-cooled fast reactor with molten-salt storage is under construction near the retiring Naughton coal plant; completion is expected around 2030.\",\n  url:\"https://www.energy.gov/ne/articles/nrc-issues-construction-permit-terrapowers-natrium-advanced-reactor\", src:\"DOE — Natrium construction permit\"},\n {n:\"Hermes & Hermes 2\", loc:\"Oak Ridge, Tennessee\", lat:35.9280, lng:-84.3970, s:\"build\",\n  d:\"Kairos Power holds NRC construction permits for its Hermes (Dec 2023) and Hermes 2 (Nov 2024) fluoride-salt-cooled test reactors at the East Tennessee Technology Park. Both are under construction; Hermes 2 broke ground in April 2025.\",\n  url:\"https://www.nrc.gov/reactors/non-power/new-facility-licensing/hermes-kairos\", src:\"NRC — Hermes (Kairos) application\"},\n {n:\"ACU Molten Salt Research Reactor\", loc:\"Abilene, Texas\", lat:32.4692, lng:-99.7075, s:\"build\",\n  d:\"Abilene Christian University received an NRC construction permit in September 2024 for its 1 MWt molten salt research reactor — the first US university research reactor permitted in decades.\",\n  url:\"https://www.ans.org/news/article-7818/nrc-approves-terrapower-construction-permit/\", src:\"ANS — recent NRC construction permits\"},\n {n:\"Vogtle Units 3–4\", loc:\"Waynesboro, Georgia\", lat:33.1426, lng:-81.7626, s:\"op\",\n  d:\"The one completed run of the modern permit pipeline: Early Site Permit ESP-004 (2009) fed Combined Licenses issued February 2012, and the two AP1000 units entered commercial operation in 2023 and 2024.\",\n  url:\"https://www.nrc.gov/reactors/new-reactors/large-lwr/col-holder\", src:\"NRC — Combined License holders\"},\n {n:\"Belews Creek ESP Site\", loc:\"Stokes County, North Carolina\", lat:36.2807, lng:-80.0616, s:\"review\",\n  d:\"Duke Energy filed an Early Site Permit application for a coal-to-nuclear conversion at its Belews Creek coal site; the NRC acknowledged receipt in January 2026 and hearing-opportunity visible = Object.fromEntries(Object.keys(STAGES).map(k=>[k,true]));\nconst markers = [];\n\nfunction popupHtml(site){\n  const st = STAGES[site.s];\n  return `<span class=\"pp-stage\" style=\"background:${st.color};${st.hollow?'color:#272E2E':''}\">${st.label.split('—')[0].trim()}<\u002Fspan>\n    <div class=\"pp-title\">${site.n}<\u002Fdiv>\n    <div class=\"pp-sub\">${site.loc}<\u002Fdiv>\n    <div class=\"pp-body\">${site.d}<\u002Fdiv>\n    <a class=\"pp-link\" href=\"${site.url}\" target=\"_blank\" rel=\"noopener\">View data source ↗<\u002Fa>`;\n}\nSITES.forEach(site=>{\n  const st = STAGES[site.s];\n  const r = site.star ? 11 : (st.featured ? 9 : 7);\n  const m = L.circleMarker([site.lat,site.lng],{\n    radius:r,\n    color: st.hollow ? st.color : '#272E2E',\n    weight: st.hollow ? 2 : 1.5,\n    fillColor: st.hollow ? '#F4F5F5' : st.color,\n    fillOpacity: st.hollow ? .9 : .92\n  }).bindPopup(popupHtml(site),{maxWidth:320});\n  m._site = site;\n  m.addTo(map);\n  markers.push(m);\n  if(site.star){\n    // pulse halo for the specially featured sites\n    const halo = L.circleMarker([site.lat,site.lng],{radius:r, color:st.color, weight:2, fill:false, interactive:false, className:'pulse'}).addTo(map);\n    m._halo = halo;\n  }\n});\n\nfunction refresh(){\n  markers.forEach(m=>{\n    const on = visible[m._site.s];\n    m.setStyle({opacity:on?1:0, fillOpacity:on?(STAGES[m._site.s].hollow?.9:.92):0});\n    if(on){ m.addTo(map); if(m._halo) m._halo.addTo(map);} else { map.removeLayer(m); if(m._halo) map.removeLayer(m._halo);}\n  });\n}\n\n// Policy choropleth — lon/lat US-states GeoJSON from Leaflet's official example data (statesData global)\nlet policyLayer = null, policyOn = true;\nif (window.statesData) {\n  policyLayer = L.geoJSON(window.statesData, {\n    pane:'states',\n    style: f => {\n      const cat = POLICY_CATS[(STATE_POLICY[f.properties.name]||{c:'open'}).c];\n      return {color:'#F4F5F5', weight:1, fillColor:cat.color, fillOpacity:cat.fillOp};\n    },\n    onEachFeature: (f, layer) => {\n      const p = STATE_POLICY[f.properties.name] || {c:'open', n:'No statewide restrictions on new nuclear construction'};\n      const cat = POLICY_CATS[p.c];\n      layer.bindTooltip(`<b>${f.properties.name}<\u002Fb><br><span class=\"tt-meta\" style=\"color:${p.c==='open'?'#0e7d89':cat.color}\">${cat.label.split('—')[0].trim()}<\u002Fspan><br>${p.n}`,\n        {sticky:true, className:'state-tip'});\n      layer.on('mouseover', ()=>layer.setStyle({weight:2, color:'#272E2E'}));\n      layer.on('mouseout', ()=>layer.setStyle({weight:1, color:'#F4F5F5'}));\n    }\n  });\n  if(policyOn) policyLayer.addTo(map);\n}\nconst toggleEl = document.getElementById('policyToggle');\ntoggleEl.onclick = ()=>{\n  policyOn = !policyOn;\n  toggleEl.classList.toggle('on', policyOn);\n  if(policyLayer){ policyOn ? policyLayer.addTo(map) : map.removeLayer(policyLayer); }\n};\nconst prospectToggleEl = document.getElementById('prospectToggle');\nprospectToggleEl.onclick = ()=>{\n  prospectOn = !prospectOn;\n  prospectToggleEl.classList.toggle('on', prospectOn);\n  prospectOn ? prospectLayer.addTo(map) : map.removeLayer(prospectLayer);\n};\nconst expandToggleEl = document.getElementById('expandToggle');\nexpandToggleEl.onclick = ()=>{\n  expandOn = !expandOn;\n  expandToggleEl.classList.toggle('on', expandOn);\n  expandOn ? expandLayer.addTo(map) : map.removeLayer(expandLayer);\n};\nconst milToggleEl = document.getElementById('milToggle');\nmilToggleEl.onclick = ()=>{\n  milOn = !milOn;\n  milToggleEl.classList.toggle('on', milOn);\n  milOn ? milLayer.addTo(map) : map.removeLayer(milLayer);\n};\nconst fleetToggleEl = document.getElementById('fleetToggle');\nfleetToggleEl.onclick = ()=>{\n  fleetOn = !fleetOn;\n  fleetToggleEl.classList.toggle('on', fleetOn);\n  fleetOn ? fleetLayer.addTo(map) : map.removeLayer(fleetLayer);\n};\nconst plEl = document.getElementById('policyLegend');\nObject.values(POLICY_CATS).forEach(cat=>{\n  const row = document.createElement('div');\n  row.className='legend-row';\n  row.innerHTML = `<span class=\"dot\" style=\"background:${cat.color}; opacity:.75\"><\u002Fspan><b>${cat.label}<\u002Fb>`;\n  plEl.appendChild(row);\n});\n\n// Legend\nconst legendEl = document.getElementById('legend');\nObject.entries(STAGES).forEach(([k,st])=>{\n  const count = SITES.filter(s=>s.s===k).length;\n  const row = document.createElement('div');\n  row.className='legend-row';\n  row.innerHTML = `<span class=\"dot\" style=\"${st.hollow?`border-color:${st.color};background:#F4F5F5`:`background:${st.color}`}\"><\u002Fspan><b>${st.label}<\u002Fb><span class=\"count\">${count}<\u002Fspan>`;\n  row.onclick = ()=>{ visible[k]=!visible[k]; row.classList.toggle('off',!visible[k]); refresh(); };\n  legendEl.appendChild(row);\n});\n\n// Featured cards: active ESPs + issued-but-unbuilt COLs, Grand Gulf first\nconst featEl = document.getElementById('featured');\nconst featured = SITES.filter(s=>STAGES[s.s].featured || s.star).sort((a,b)=>(b.star?1:0)-(a.star?1:0));\nfeatured.forEach(site=>{\n  const card = document.createElement('div');\n  card.className='featured-card';\n  card.style.borderLeftColor = STAGES[site.s].color;\n  card.innerHTML = `<h3>${site.n}<\u002Fh3><div class=\"meta\">${site.loc.toUpperCase()}<\u002Fdiv><p>${site.d.split('.').slice(0,1)}.<\u002Fp>`;\n  card.onclick = ()=>{\n    const m = markers.find(m=>m._site===site);\n    map.flyTo([site.lat,site.lng], 7, {duration:.8});\n    setTimeout(()=>m.openPopup(), 850);\n  };\n  featEl.appendChild(card);\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
